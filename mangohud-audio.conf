# MangoHud config with the in-game PipeWire / winepipewire audio overlay.
#
# This uses the patched MangoHud "audio" element (native ImGui rendering: DSP
# load histogram, output L/R meters, per-channel bed bars), NOT the old
# custom_text/exec rows (MangoHud clips exec output to ~9 chars and can't render
# Unicode, so a native element is the only way to show this).
#
# Requires:
#   1. A patched libMangoHud.so built from the MangoHud tree with the audio
#      element (see mangohud-audio-element.patch). For Steam games the patched
#      lib must be the one the pressure-vessel container loads (replace the
#      system /usr/lib/mangohud + /usr/lib32/mangohud libs, or point the loader
#      at the build via VK_ADD_IMPLICIT_LAYER_PATH).
#   2. The host daemon collecting data into ~/.cache/pw-audio-hud/pw-stats.txt:
#        python3 /abs/path/winepipewire-bench/pw_audio_mon.py &
#      ($HOME is bind-mounted into the Steam container; $XDG_RUNTIME_DIR is NOT,
#      which is why the stats file lives under $HOME.)
#
# Steam launch options (replace /home/USER with your home - Steam does not
# expand ~ or $HOME). The Bed row needs the driver writing its spatial stats to
# the same dir:
#   MANGOHUD=1 PROTON_SPATIAL_SOUND=1 WINE_SPATIAL_STATS=/home/USER/.cache/pw-audio-hud/pw-spatial.txt %command%
#
# The element reads ~/.cache/pw-audio-hud/pw-stats.txt by default; override with
# the MANGOHUD_AUDIO_STATS env var if you change the daemon's --dir.
#
# legacy_layout=0 is required: the audio element (like the frametime graph) is a
# config-order/table element and is not drawn in the legacy stacked layout.

legacy_layout=0
font_size=20

fps
frametime=1
gpu_stats
cpu_stats
ram
audio=1
