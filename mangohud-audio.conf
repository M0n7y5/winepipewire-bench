# MangoHud config with a PipeWire / winepipewire audio overlay.
#
# Use one of:
#   - copy to ~/.config/MangoHud/MangoHud.conf, or
#   - point at it per-launch: MANGOHUD_CONFIGFILE=/abs/path/mangohud-audio.conf
#
# Requires, on the HOST, the monitor daemon running before the game starts:
#   python3 /abs/path/winepipewire-bench/pw_audio_mon.py &
# And the game launched with MangoHud + (for the per-bed-channel row) the stats env:
#   Steam launch options:
#     MANGOHUD=1 PROTON_SPATIAL_SOUND=1 WINE_SPATIAL_STATS=/run/user/1000/pw-spatial.txt %command%
#   (adjust 1000 to your `id -u`; the Bed row is empty without WINE_SPATIAL_STATS).
#
# exec= needs legacy_layout, and `env -u LD_PRELOAD` dodges the Steam-container
# exec bug (MangoHud #1339 - the runtime's LD_PRELOAD makes the spawned cat fail).
# $XDG_RUNTIME_DIR expands because exec runs through a shell.

legacy_layout=1
font_size=20
table_columns=1

# --- standard perf rows ---
fps
frametime=1
gpu_stats
gpu_temp
cpu_stats
cpu_temp
ram

# --- audio: each row reads a file written by pw_audio_mon.py ---
custom_text_center=Audio
custom_text=PW
exec=env -u LD_PRELOAD cat "$XDG_RUNTIME_DIR/pw-row-info.txt" 2>/dev/null
custom_text=DSP
exec=env -u LD_PRELOAD cat "$XDG_RUNTIME_DIR/pw-row-dsp.txt" 2>/dev/null
custom_text=Out
exec=env -u LD_PRELOAD cat "$XDG_RUNTIME_DIR/pw-row-lvl.txt" 2>/dev/null
custom_text=Bed
exec=env -u LD_PRELOAD cat "$XDG_RUNTIME_DIR/pw-row-bed.txt" 2>/dev/null
